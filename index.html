<!DOCTYPE html>
<html>
<head>
<title>Google Classroom</title>
<link rel="shortcut icon" href="https://ssl.gstatic.com/classroom/favicon.png">
<style>
   #overlayPage {
    position: fixed;
    inset: 0;
    background: white;
    z-index: 9999;
    display: none; /* hidden by default */
  }
</style>
   <script>
  const overlay = document.getElementById("overlayPage");

  function showOverlay() {
    overlay.style.display = "block";
  }

  function hideOverlay() {
    overlay.style.display = "none";
  }

  document.addEventListener("keydown", (event) => {
    // ALT (left alt usually) -> show overlay
    if (event.code === "AltLeft") {
      showOverlay();
    }

    // ALTGR (Right Alt / AltGraph) -> hide overlay
    // Many browsers report AltGr as "AltRight" + ctrl/alt combination or AltGraph state
    if (
      event.code === "AltRight" ||
      event.key === "AltGraph" ||
      event.getModifierState?.("AltGraph")
    ) {
      hideOverlay();
    }
  });

  // Optional: prevent default browser behavior for Alt key combos
  document.addEventListener("keydown", (event) => {
    if (event.code === "AltLeft" || event.code === "AltRight") {
      event.preventDefault();
    }
  });
</script>
</head>
<body>
  <div id="mainPage">
<iframe style="position: absolute; width: 100%; height: 100%;" src="https://overeasy.club/" scrolling="no"></iframe>
  </div>
  <div id="overlayPage">
  <iframe style="position: absolute; width: 100%; height: 100%;" src="./class.html" scrolling="no"></iframe>
</div>
</body>
</html>
